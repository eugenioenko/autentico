name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Create UI placeholders
        run: |
          mkdir -p pkg/admin/dist && echo '<!doctype html>' > pkg/admin/dist/index.html
          mkdir -p pkg/account/dist && echo '<!doctype html>' > pkg/account/dist/index.html
      - name: Download golangci-lint binary
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b ./bin v2.1.5
      - name: Run golangci-lint
        run: ./bin/golangci-lint run ./...

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.0
      - name: Check formatting
        run: gofmt -l -e .

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Build binary (includes admin + account UIs)
        run: make build
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: autentico-binary
          path: autentico
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.0
      - name: Create UI placeholders
        run: |
          mkdir -p pkg/admin/dist && echo '<!doctype html>' > pkg/admin/dist/index.html
          mkdir -p pkg/account/dist && echo '<!doctype html>' > pkg/account/dist/index.html
      - name: Install dependencies
        run: go mod tidy
      - name: Run tests
        run: go test -p 1 -v ./...

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.0
      - name: Create UI placeholders
        run: |
          mkdir -p pkg/admin/dist && echo '<!doctype html>' > pkg/admin/dist/index.html
          mkdir -p pkg/account/dist && echo '<!doctype html>' > pkg/account/dist/index.html
      - name: Run go vet
        run: go vet ./...

  functional:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: autentico-binary
      - name: Make binary executable
        run: chmod +x autentico
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        working-directory: tests/functional
        run: pnpm install
      - name: Run functional tests
        working-directory: tests/functional
        run: pnpm test

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: autentico-binary
      - name: Make binary executable
        run: chmod +x autentico
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install browser test dependencies
        working-directory: tests/browser
        run: npm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('tests/browser/package-lock.json') }}
      - name: Install Playwright browsers
        working-directory: tests/browser
        run: npx playwright install chromium --with-deps
      - name: Run smoke tests
        working-directory: tests/browser
        run: npx playwright test

  tidy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.0
      - name: Check for uncommitted changes after go mod tidy
        run: |
          go mod tidy
          git diff --exit-code
