{{define "layout"}}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{block "title" .}}{{.ThemeTitle}}{{end}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-size: 16px;
      --font-family: "Inter", system-ui, -apple-system, sans-serif;
      --h1-font-size: 1.8rem;

      --border-radius: 10px;
      --form-width: 400px;
      --form-padding: 36px;
      --form-gap: 1.1rem;

      --logo-size: 80px;
      --logo-padding: 1rem;

      --input-padding: 13px 16px;
      --button-padding: 13px 20px;
      --label-padding: 0 0 6px 0;

      --color-primary: #5b8cff;
      --color-primary-glow: rgba(91, 140, 255, 0.25);
      --color-accent: #1aa070;
      --color-danger: #ff5a5a;
      --color-text: #e8eaf0;
      --color-text-muted: #8b90a0;
      --color-inverse: #ffffff;
      --color-background: #080c14;
      --color-card: rgba(255, 255, 255, 0.025);
      --color-card-border: rgba(255, 255, 255, 0.08);
      --color-input: rgba(255, 255, 255, 0.06);
      --color-input-border: rgba(255, 255, 255, 0.13);
      --color-logo-bg: rgba(255, 255, 255, 0.08);
    }
  </style>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: var(--font-family);
      font-weight: 300;
      background-color: var(--color-background);
      font-size: var(--font-size);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      flex-grow: 1;
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    footer {
      position: relative;
      z-index: 1;
    }

    form,
    .card {
      background: var(--color-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--color-card-border);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      padding: var(--form-padding);
      border-radius: var(--border-radius);
      width: 100%;
      max-width: var(--form-width);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--form-gap);
    }

    h1 {
      font-size: var(--h1-font-size);
      font-weight: 200;
      margin: 0 0 0.75rem 0;
      letter-spacing: 0.04em;
      color: var(--color-inverse);
    }

    label {
      padding: var(--label-padding);
      display: block;
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--color-text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: var(--input-padding);
      border-radius: calc(var(--border-radius) - 2px);
      border: 1px solid var(--color-input-border);
      background: var(--color-input);
      color: var(--color-text);
      font-size: 1rem;
      font-weight: 300;
      font-family: var(--font-family);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-glow);
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--color-text-muted);
    }

    button[type="submit"] {
      width: 100%;
      padding: var(--button-padding);
      background: linear-gradient(135deg, #5b8cff 0%, #2e5bff 100%);
      color: var(--color-inverse);
      border: none;
      border-radius: calc(var(--border-radius) - 2px);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      font-family: var(--font-family);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 1.5rem;
      box-shadow: 0 4px 20px rgba(46, 91, 255, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button[type="submit"]:hover {
      box-shadow: 0 0 22px rgba(91, 140, 255, 0.5), 0 0 50px rgba(91, 140, 255, 0.2);
    }

    .logo {
      width: var(--logo-size);
      height: var(--logo-size);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 9999px;
      background: var(--color-primary);
      border: 1px solid var(--color-primary);
      padding: var(--logo-padding);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .logo>svg,
    .logo>img {
      color: #ffffff;
      max-width: 100%;
      max-height: 100%;
    }

    .control {
      width: 100%;
    }

    .error {
      width: 100%;
      padding: 10px 14px;
      border-radius: calc(var(--border-radius) - 2px);
      background: rgba(255, 90, 90, 0.1);
      border: 1px solid rgba(255, 90, 90, 0.25);
      color: var(--color-danger);
      font-size: 0.9rem;
      text-align: center;
    }

    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--color-text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-top: 1px solid var(--color-input-border);
    }

    button.passkey-btn {
      width: 100%;
      padding: var(--button-padding);
      background: var(--color-input);
      color: var(--color-text);
      border: 1px solid var(--color-card-border);
      border-radius: calc(var(--border-radius) - 2px);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 300;
      font-family: var(--font-family);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    button.passkey-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .auth-link {
      color: var(--color-text-muted);
      text-align: center;
    }

    .auth-link a {
      color: var(--color-primary);
      text-decoration: none;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }
  </style>

  {{block "styles" .}}{{end}}
  {{if .ThemeCssResolved}}
  <style>
    {
        {
        .ThemeCssResolved
      }
    }
  </style>
  {{end}}
</head>

<body id="autentico">
  <canvas id="bg-canvas"></canvas>
  <main>
    {{block "content" .}}{{end}}
  </main>
  <footer></footer>
  <script>
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      const MOBILE = window.innerWidth < 768;
      const COUNT = MOBILE ? 70 : 160;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function mkStar() {
        return {
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.2 + 0.2,
          baseOpacity: Math.random() * 0.55 + 0.15,
          twinkleSpeed: Math.random() * 0.025 + 0.004,
          twinkleOffset: Math.random() * Math.PI * 2,
          dx: (Math.random() - 0.5) * 0.06,
          dy: (Math.random() - 0.5) * 0.06,
        };
      }

      resize();
      const stars = Array.from({ length: COUNT }, mkStar);
      let t = 0;

      // Shooting star
      let shooter = null;

      function spawnShooter() {
        const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.4;
        shooter = {
          x: Math.random() * canvas.width * 0.7,
          y: Math.random() * canvas.height * 0.4,
          angle,
          speed: 5 + Math.random() * 3,
          length: 180 + Math.random() * 80,
          life: 0,
          maxLife: 120 + Math.random() * 30,
        };
        setTimeout(spawnShooter, 6500 + Math.random() * 2000);
      }

      setTimeout(spawnShooter, 3000 + Math.random() * 4000);

      function drawShooter() {
        if (!shooter) return;
        shooter.life++;

        const progress = shooter.life / shooter.maxLife;
        const opacity = progress < 0.15
          ? progress / 0.15
          : progress > 0.75
            ? 1 - (progress - 0.75) / 0.25
            : 1;

        shooter.x += Math.cos(shooter.angle) * shooter.speed;
        shooter.y += Math.sin(shooter.angle) * shooter.speed;

        const tailX = shooter.x - Math.cos(shooter.angle) * shooter.length;
        const tailY = shooter.y - Math.sin(shooter.angle) * shooter.length;

        const grad = ctx.createLinearGradient(tailX, tailY, shooter.x, shooter.y);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(1, `rgba(255,255,255,${opacity * 0.9})`);

        ctx.save();
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#c8d8ff';
        ctx.beginPath();
        ctx.moveTo(tailX, tailY);
        ctx.lineTo(shooter.x, shooter.y);
        ctx.stroke();
        ctx.restore();

        if (shooter.life >= shooter.maxLife) shooter = null;
      }

      function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        t++;

        for (const s of stars) {
          const opacity = s.baseOpacity * (0.55 + 0.45 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));

          s.x += s.dx;
          s.y += s.dy;
          if (s.x < 0) s.x = canvas.width;
          else if (s.x > canvas.width) s.x = 0;
          if (s.y < 0) s.y = canvas.height;
          else if (s.y > canvas.height) s.y = 0;

          ctx.save();
          ctx.globalAlpha = opacity;
          ctx.shadowBlur = s.r * 8;
          ctx.shadowColor = '#c8d8ff';
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        drawShooter();
        requestAnimationFrame(frame);
      }

      window.addEventListener('resize', resize);
      frame();
    })();
  </script>
  {{block "scripts" .}}{{end}}
</body>

</html>
{{end}}
