{{define "content"}}
<form method="POST" action="{{authURL "/onboard"}}">
  {{template "logo" .}}
  <h1>Initial Admin Setup</h1>
  <p style="text-align: center; color: #666; margin-bottom: 20px;">
    Create the first administrator account to start using Auténtico.
  </p>
  {{ .csrfField }}
  <input type="hidden" name="state" value="{{.State}}" />
  <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}" />
  <input type="hidden" name="client_id" value="{{.ClientID}}" />
  <input type="hidden" name="scope" value="{{.Scope}}" />
  <input type="hidden" name="nonce" value="{{.Nonce}}" />
  <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}" />
  <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}" />
  <div class="control">
    {{if .UsernameIsEmail}}
    <label for="username">Email</label>
    <input type="email" id="username" name="username" required autocomplete="email" placeholder="admin@example.com" />
    {{else}}
    <label for="username">Administrator Username</label>
    <input type="text" id="username" name="username" required autocomplete="username" placeholder="admin" />
    {{end}}
  </div>
  {{if .EmailRequired}}
  <div class="control">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email" />
  </div>
  {{end}}
  <div class="control">
    <label for="password">Administrator Password</label>
    <input type="password" id="password" name="password" required autocomplete="new-password" />
  </div>
  <div class="control">
    <label for="confirm_password">Confirm Password</label>
    <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" />
  </div>
  {{if .Error}}
     <div class="error" role="alert">{{.Error}}</div>
  {{else}}
     <div class="error" role="alert" style="display:none"></div>
  {{end}}
  <button type="submit">Complete Setup</button>
</form>
{{end}}
