{{define "title"}}{{.ThemeTitle}} - 设置身份验证器{{end}}

{{define "content"}}
<form class="auth-card" method="POST" action="{{authURL "/mfa"}}">
  <h1 class="auth-title">设置身份验证器</h1>
  <p class="auth-text-muted">使用身份验证器应用扫描二维码，然后输入下方验证码完成验证。</p>
  {{ .csrfField }}
  <input type="hidden" name="challenge_id" value="{{.ChallengeID}}" />
  <input type="hidden" name="totp_secret" value="{{.TotpSecret}}" />
  <div class="auth-qr-code">
    <img src="{{.QRCodeDataURI}}" alt="Scan this QR code with your authenticator app" />
  </div>
  <p class="auth-text-muted">或手动输入此密钥：</p>
  <div class="auth-secret-key">{{.TotpSecret}}</div>
  {{if .Error}}
  <div class="auth-error" role="alert">{{.Error}}</div>
  {{end}}
  <div class="auth-field">
    <label class="auth-label" for="code">验证码</label>
    <input class="auth-input" type="text" id="code" name="code" required maxlength="6" pattern="[0-9]{6}" autocomplete="one-time-code" inputmode="numeric" />
  </div>
  <button class="auth-btn" type="submit">验证并启用</button>
</form>
{{end}}
