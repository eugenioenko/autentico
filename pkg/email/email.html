<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <!-- Preheader (hidden preview text shown by email clients) -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">{{.Preheader}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;min-width:100%;">
    <tr>
      <td align="center" style="padding:48px 24px 64px 24px;">

        <table role="presentation" cellpadding="0" cellspacing="0" style="width:100%;max-width:580px;background-color:#ffffff;border-radius:10px;">

          <!-- Logo + App Name -->
          <tr>
            <td style="padding:32px 48px 0 48px;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="vertical-align:middle;padding-right:8px;">
                    <img src="{{.LogoURL}}" alt="" width="36" height="36" style="display:block;border:0;" />
                  </td>
                  <td style="vertical-align:middle;">
                    <span style="font-size:28px;font-weight:700;color:#3f3f46;letter-spacing:-0.3px;">{{.AppName}}</span>
                  </td>
                </tr>
              </table>
              {{if .Tagline}}<p style="margin:8px 0 0 0;font-size:13px;color:#71717a;">{{.Tagline}}</p>{{end}}
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px 48px 32px 48px;color:#3f3f46;font-size:16px;line-height:1.7;">
              <p style="margin:0 0 28px 0;font-size:22px;font-weight:700;color:#3f3f46;letter-spacing:-0.4px;line-height:1.3;">{{.Title}}</p>
              {{.Body}}
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 48px;">
              <hr style="border:none;border-top:1px solid #e4e4e7;margin:0;" />
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 48px 32px 48px;text-align:center;">
              <p style="margin:0 0 12px 0;font-size:12px;line-height:1.6;">
                {{range .FooterLinks}}<a href="{{.URL}}" style="color:#71717a;text-decoration:none;">{{.Label}}</a><span style="color:#d4d4d8;padding:0 6px;">&middot;</span>{{end}}<a href="{{.AccountURL}}" style="color:#71717a;text-decoration:none;">Manage your account</a>
              </p>
              {{range .FooterTextLines}}<p style="margin:0 0 4px 0;font-size:11px;color:#71717a;line-height:1.6;">{{.}}</p>
              {{end}}
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
