<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <!-- Preheader (hidden preview text shown by email clients) -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">{{.Preheader}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;min-width:100%;">
    <tr>
      <td align="center" style="padding:48px 24px 64px 24px;">

        <!-- Wrapper card, max 580px -->
        <table role="presentation" cellpadding="0" cellspacing="0" style="width:100%;max-width:580px;">

          <!-- Header -->
          <tr>
            <td style="background-color:#18181b;border-radius:10px 10px 0 0;padding:28px 48px;">
              <p style="margin:0 0 4px 0;font-size:16px;font-weight:600;color:#ffffff;letter-spacing:-0.2px;">{{.AppName}}</p>
              <p style="margin:0;font-size:12px;color:#71717a;">Simple. Safe. Self-hosted.</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background-color:#ffffff;padding:48px 48px 40px 48px;color:#18181b;font-size:15px;line-height:1.7;">
              <p style="margin:0 0 28px 0;font-size:22px;font-weight:700;color:#18181b;letter-spacing:-0.4px;line-height:1.3;">{{.Title}}</p>
              {{.Body}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#18181b;border-radius:0 0 10px 10px;padding:24px 48px;">
              <p style="margin:0;font-size:12px;color:#a1a1aa;line-height:1.6;">
                {{.AppName}} &nbsp;&middot;&nbsp; <a href="{{.AppURL}}" style="color:#d4d4d8;text-decoration:none;">Manage your account</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
