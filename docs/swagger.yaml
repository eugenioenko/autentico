host: localhost:9999
info:
  contact: {}
  description: Self-contained OAuth 2.0 / OpenID Connect (OIDC) Identity Provider
    built with Go and SQLite.
  title: Autentico OIDC
  version: "1.0"
paths:
  /.well-known/openid-configuration:
    get:
      consumes:
      - application/json
      description: Returns the OpenID Connect Well-Known Configuration
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WellKnownConfigResponse'
      summary: Get Well-Known Configuration
      tags:
      - oauth2
  /account/api/connected-providers:
    get:
      description: Returns all external identity providers linked to the authenticated
        user's account.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/account.ConnectedProviderResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - UserAuth: []
      summary: List connected providers
      tags:
      - account-federation
  /account/api/connected-providers/{id}:
    delete:
      description: Removes a linked external identity provider. Cannot disconnect
        the only login method.
      parameters:
      - description: Federated identity ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ApiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - UserAuth: []
      summary: Disconnect a provider
      tags:
      - account-federation
  /account/api/deletion-request:
    delete:
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - UserAuth: []
      summary: Cancel the current user's pending deletion request
      tags:
      - account-deletion
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/deletion.DeletionRequestResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - UserAuth: []
      summary: Get pending deletion request for current user
      tags:
      - account-deletion
    post:
      consumes:
      - application/json
      description: Submits a deletion request for the authenticated user. If self-service
        deletion is enabled, the account is deleted immediately.
      parameters:
      - description: Optional deletion reason
        in: body
        name: body
        schema:
          $ref: '#/definitions/deletion.CreateDeletionRequestInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/deletion.DeletionRequestResponse'
        "204":
          description: Account deleted immediately (self-service mode)
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.ApiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - UserAuth: []
      summary: Request account deletion
      tags:
      - account-deletion
  /account/api/mfa:
    get:
      description: Returns the MFA enrollment status for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.MfaStatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - UserAuth: []
      summary: Get MFA status
      tags:
      - account-security
  /account/api/mfa/totp:
    delete:
      consumes:
      - application/json
      description: Disables TOTP MFA for the authenticated user. Requires current
        password and a valid TOTP code. Revokes all sessions after disabling.
      parameters:
      - description: Password and TOTP code for confirmation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/account.DisableMfaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ApiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - UserAuth: []
