basePath: /
definitions:
  admin.StatsResponse:
    properties:
      active_clients:
        type: integer
      active_sessions:
        type: integer
      recent_logins:
        type: integer
      total_sessions:
        type: integer
      total_users:
        type: integer
    type: object
  client.ClientCreateRequest:
    properties:
      access_token_expiration:
        description: Per-client overrides
        type: string
      allow_self_signup:
        type: boolean
      allowed_audiences:
        items:
          type: string
        type: array
      authorization_code_expiration:
        type: string
      client_id:
        type: string
      client_name:
        type: string
      client_type:
        type: string
      grant_types:
        items:
          type: string
        type: array
      post_logout_redirect_uris:
        items:
          type: string
        type: array
      redirect_uris:
        items:
          type: string
        type: array
      refresh_token_expiration:
        type: string
      response_types:
        items:
          type: string
        type: array
      scopes:
        type: string
      sso_session_idle_timeout:
        type: string
      token_endpoint_auth_method:
        type: string
      trust_device_enabled:
        type: boolean
      trust_device_expiration:
        type: string
    type: object
  client.ClientInfoResponse:
    properties:
      access_token_expiration:
        description: Per-client overrides
        type: string
      allow_self_signup:
        type: boolean
      allowed_audiences:
        items:
          type: string
        type: array
      authorization_code_expiration:
        type: string
      client_id:
        type: string
      client_name:
        type: string
      client_type:
        type: string
      grant_types:
        items:
          type: string
        type: array
      is_active:
        type: boolean
      post_logout_redirect_uris:
        items:
          type: string
        type: array
      redirect_uris:
        items:
          type: string
        type: array
      refresh_token_expiration:
        type: string
      response_types:
        items:
          type: string
        type: array
      scopes:
        type: string
      sso_session_idle_timeout:
        type: string
      token_endpoint_auth_method:
        type: string
      trust_device_enabled:
        type: boolean
      trust_device_expiration:
        type: string
    type: object
  client.ClientResponse:
    properties:
      client_id:
        type: string
      client_name:
        type: string
      client_secret:
        type: string
      client_secret_expires_at:
        type: integer
      client_type:
        type: string
      grant_types:
        items:
          type: string
        type: array
      post_logout_redirect_uris:
        items:
          type: string
        type: array
      redirect_uris:
        items:
          type: string
        type: array
      response_types:
        items:
          type: string
        type: array
      scopes:
        type: string
      token_endpoint_auth_method:
        type: string
    type: object
  client.ClientUpdateRequest:
    properties:
      access_token_expiration:
        description: Per-client overrides
        type: string
      allow_self_signup:
        type: boolean
      allowed_audiences:
        items:
          type: string
        type: array
      authorization_code_expiration:
        type: string
      client_name:
        type: string
      grant_types:
        items:
          type: string
        type: array
      is_active:
        type: boolean
      post_logout_redirect_uris:
        items:
          type: string
        type: array
      redirect_uris:
        items:
          type: string
        type: array
      refresh_token_expiration:
        type: string
      response_types:
        items:
          type: string
        type: array
      scopes:
        type: string
      sso_session_idle_timeout:
        type: string
      token_endpoint_auth_method:
        type: string
      trust_device_enabled:
        type: boolean
      trust_device_expiration:
        type: string
    type: object
  health.HealthResponse:
    properties:
      database:
        type: string
      status:
        type: string
    type: object
  introspect.IntrospectRequest:
    properties:
      token:
        type: string
    type: object
  introspect.IntrospectResponse:
    properties:
      active:
        description: Whether the token is valid (true or false).
        type: boolean
      aud:
        description: Intended audience for the token (e.g., the API).
        type: string
      client_id:
        description: Client ID for which the token was issued.
        type: string
      error:
        type: string
      error_description:
        type: string
      exp:
        description: Expiration time (Unix timestamp).
        type: integer
      iat:
        description: Issued-at time (Unix timestamp).
        type: integer
      jti:
        description: Unique identifier for the token.
        type: string
      nbf:
        description: Not-before time (Unix timestamp).
        type: integer
      scope:
        description: Space-delimited list of scopes associated with the token.
        type: string
      sub:
        description: The subject of the token (typically the user ID).
        type: string
      token_type:
        description: The type of the token (usually "bearer").
        type: string
      username:
        description: The username of the authenticated user.
        type: string
    type: object
  model.ApiError:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  model.AuthErrorResponse:
    properties:
      error:
        type: string
      error_description:
        type: string
    type: object
  model.JWK:
    properties:
      alg:
        description: Algorithm (e.g., RS256)
        type: string
      e:
        description: Exponent (base64url-encoded)
        type: string
      kid:
        description: Key ID
        type: string
      kty:
        description: Key Type (e.g., RSA)
        type: string
      "n":
        description: Modulus (base64url-encoded)
        type: string
      use:
        description: Public Key Use (e.g., sig)
        type: string
    type: object
  model.JWKSResponse:
    properties:
      keys:
        items:
          $ref: '#/definitions/model.JWK'
        type: array
    type: object
  model.WellKnownConfigResponse:
    properties:
      authorization_endpoint:
        type: string
      claims_supported:
        items:
          type: string
        type: array
      end_session_endpoint:
        type: string
      id_token_signing_alg_values_supported:
        items:
          type: string
        type: array
      issuer:
        type: string
      jwks_uri:
        type: string
      registration_endpoint:
        type: string
      response_types_supported:
        items:
          type: string
        type: array
      scopes_supported:
        items:
          type: string
        type: array
      subject_types_supported:
        items:
          type: string
        type: array
      token_endpoint:
        type: string
      token_endpoint_auth_methods_supported:
        items:
          type: string
        type: array
      userinfo_endpoint:
        type: string
    type: object
  session.SessionResponse:
    properties:
      created_at:
        type: string
      deactivated_at:
        type: string
      device_id:
        type: string
      expires_at:
        type: string
      id:
        type: string
      ip_address:
        type: string
      last_activity_at:
        type: string
      location:
        type: string
      status:
        type: string
      user_agent:
        type: string
      user_id:
        type: string
    type: object
  token.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      id_token:
        type: string
      refresh_token:
        type: string
      scope:
        type: string
      token_type:
        type: string
    type: object
  user.UserCreateRequest:
    properties:
      email:
        type: string
      password:
        type: string
      role:
        description: optional role assignment
        type: string
      username:
        type: string
    type: object
  user.UserResponse:
    properties:
      address_country:
        type: string
      address_locality:
        type: string
      address_postal_code:
        type: string
      address_region:
        type: string
      address_street:
        type: string
      created_at:
        type: string
      email:
        type: string
      failed_login_attempts:
        type: integer
      family_name:
        type: string
      given_name:
        description: OIDC standard profile claims
        type: string
      id:
        type: string
      is_email_verified:
        type: boolean
      locale:
        type: string
      locked_until:
        type: string
      phone_number:
        type: string
      picture:
        type: string
      role:
        type: string
      totp_verified:
        type: boolean
      username:
        type: string
      zoneinfo:
        type: string
    type: object
host: localhost:9999
info:
  contact: {}
  description: Authentication Service
  title: Autentico OIDC
  version: "1.0"
paths:
  /.well-known/jwks.json:
    get:
      consumes:
      - application/json
      description: Returns the JSON Web Key Set for verifying JWTs
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.JWKSResponse'
      summary: Get JWKS
      tags:
      - Well-Known
  /.well-known/openid-configuration:
    get:
      consumes:
      - application/json
      description: Returns the OpenID Connect Well-Known Configuration
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WellKnownConfigResponse'
      summary: Get Well-Known Configuration
      tags:
      - Well-Known
  /admin/api/clients:
    get:
      consumes:
      - application/json
      description: Lists all registered clients (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/client.ClientInfoResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: List all clients
      tags:
      - client
    post:
      consumes:
      - application/json
      description: Registers a new OAuth2/OIDC client (admin only)
      parameters:
      - description: Client registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/client.ClientCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/client.ClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: Register a new OAuth2 client
      tags:
      - client
  /admin/api/clients/{client_id}:
    delete:
      consumes:
      - application/json
      description: Deactivates (soft deletes) a registered client (admin only)
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: Deactivate a client
      tags:
      - client
    get:
      consumes:
      - application/json
      description: Retrieves information about a registered client (admin only)
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.ClientInfoResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: Get client information
      tags:
      - client
    put:
      consumes:
      - application/json
      description: Updates a registered client (admin only)
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      - description: Client update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/client.ClientUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.ClientInfoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: Update client information
      tags:
      - client
  /admin/api/onboarding:
    get:
      description: Returns whether the system has been initialized with an admin account
        and the current OAuth path.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Check onboarding status
      tags:
      - onboarding
  /admin/api/sessions:
    delete:
      consumes:
      - application/json
      description: 'GET: List all active sessions or filter by user ID. DELETE: Deactivate
        a specific session.'
      parameters:
      - description: Filter sessions by User ID (GET)
        in: query
        name: user_id
        type: string
      - description: Session ID to deactivate (DELETE)
        in: query
        name: id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Deactivation result (DELETE)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Session administration
      tags:
      - sessions-admin
    get:
      consumes:
      - application/json
      description: 'GET: List all active sessions or filter by user ID. DELETE: Deactivate
        a specific session.'
      parameters:
      - description: Filter sessions by User ID (GET)
        in: query
        name: user_id
        type: string
      - description: Session ID to deactivate (DELETE)
        in: query
        name: id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Deactivation result (DELETE)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Session administration
      tags:
      - sessions-admin
  /admin/api/settings:
    get:
      consumes:
      - application/json
      description: 'GET: Retrieve all system settings (except sensitive values). PUT:
        Update multiple settings.'
      produces:
      - application/json
      responses:
        "200":
          description: All settings (GET)
          schema:
            additionalProperties:
              type: string
            type: object
        "204":
          description: Settings updated (PUT)
      security:
      - BearerAuth: []
      summary: System settings
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: 'GET: Retrieve all system settings (except sensitive values). PUT:
        Update multiple settings.'
      produces:
      - application/json
      responses:
        "200":
          description: All settings (GET)
          schema:
            additionalProperties:
              type: string
            type: object
        "204":
          description: Settings updated (PUT)
      security:
      - BearerAuth: []
      summary: System settings
      tags:
      - admin
  /admin/api/stats:
    get:
      description: Returns a summary of users, clients, and active sessions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.StatsResponse'
      security:
      - BearerAuth: []
      summary: System statistics
      tags:
      - admin
  /admin/api/users:
    delete:
      consumes:
      - application/json
      description: 'GET: List users or get user by ID. POST: Create user. PUT: Update
        user. DELETE: Soft-delete user.'
      parameters:
      - description: User ID (required for GET/PUT/DELETE single)
        in: query
        name: id
        type: string
      - description: User creation/update payload
        in: body
        name: user
        schema:
          $ref: '#/definitions/user.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of users (GET)
          schema:
            items:
              $ref: '#/definitions/user.UserResponse'
            type: array
        "201":
          description: Created user (POST)
          schema:
            $ref: '#/definitions/user.UserResponse'
      security:
      - BearerAuth: []
      summary: User administration
      tags:
      - users-admin
    get:
      consumes:
      - application/json
      description: 'GET: List users or get user by ID. POST: Create user. PUT: Update
        user. DELETE: Soft-delete user.'
      parameters:
      - description: User ID (required for GET/PUT/DELETE single)
        in: query
        name: id
        type: string
      - description: User creation/update payload
        in: body
        name: user
        schema:
          $ref: '#/definitions/user.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of users (GET)
          schema:
            items:
              $ref: '#/definitions/user.UserResponse'
            type: array
        "201":
          description: Created user (POST)
          schema:
            $ref: '#/definitions/user.UserResponse'
      security:
      - BearerAuth: []
      summary: User administration
      tags:
      - users-admin
    post:
      consumes:
      - application/json
      description: 'GET: List users or get user by ID. POST: Create user. PUT: Update
        user. DELETE: Soft-delete user.'
      parameters:
      - description: User ID (required for GET/PUT/DELETE single)
        in: query
        name: id
        type: string
      - description: User creation/update payload
        in: body
        name: user
        schema:
          $ref: '#/definitions/user.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of users (GET)
          schema:
            items:
              $ref: '#/definitions/user.UserResponse'
            type: array
        "201":
          description: Created user (POST)
          schema:
            $ref: '#/definitions/user.UserResponse'
      security:
      - BearerAuth: []
      summary: User administration
      tags:
      - users-admin
    put:
      consumes:
      - application/json
      description: 'GET: List users or get user by ID. POST: Create user. PUT: Update
        user. DELETE: Soft-delete user.'
      parameters:
      - description: User ID (required for GET/PUT/DELETE single)
        in: query
        name: id
        type: string
      - description: User creation/update payload
        in: body
        name: user
        schema:
          $ref: '#/definitions/user.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of users (GET)
          schema:
            items:
              $ref: '#/definitions/user.UserResponse'
            type: array
        "201":
          description: Created user (POST)
          schema:
            $ref: '#/definitions/user.UserResponse'
      security:
      - BearerAuth: []
      summary: User administration
      tags:
      - users-admin
  /admin/api/users/unlock:
    post:
      consumes:
      - application/json
      description: Resets the failed login attempts and clear the lockout time for
        a user.
      parameters:
      - description: User ID
        in: query
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserResponse'
      security:
      - BearerAuth: []
      summary: Unlock user account
      tags:
      - users-admin
  /healthz:
    get:
      description: Returns the health status of the server and its dependencies. Returns
        200 when healthy, 503 when the database is unreachable.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/health.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/health.HealthResponse'
      summary: Health check
      tags:
      - Health
  /oauth2/authorize:
    get:
      consumes:
      - application/json
      description: Handles the authorization request and displays the login page
      parameters:
      - description: Response type
        in: query
        name: response_type
        required: true
        type: string
      - description: Client ID
        in: query
        name: client_id
        required: true
        type: string
      - description: Redirect URI
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: Scope
        in: query
        name: scope
        type: string
      - description: State
        in: query
        name: state
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML login page
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ApiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ApiError'
      summary: Authorize a client
      tags:
      - authorize
  /oauth2/introspect:
    post:
      consumes:
      - application/json
      description: Validates and retrieves metadata about a token
      parameters:
      - description: Token introspection payload
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/introspect.IntrospectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/introspect.IntrospectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ApiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/model.ApiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ApiError'
      summary: Introspect a token
      tags:
      - introspect
  /oauth2/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticates a user and generates an authorization code
      parameters:
      - description: Username
        in: formData
        name: username
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      - description: Redirect URI
        in: formData
        name: redirect
        required: true
        type: string
      - description: State
        in: formData
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to the provided URI with code and state
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ApiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ApiError'
      summary: Log in a user
      tags:
      - auth
  /oauth2/logout:
    post:
      consumes:
      - application/json
      description: Terminates the user's session
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Session terminated successfully
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ApiError'
      summary: Log out a user
      tags:
      - session
  /oauth2/mfa:
    get:
      consumes:
      - application/x-www-form-urlencoded
      description: Renders the MFA verification or enrollment page (GET) or processes
        the MFA code (POST).
      parameters:
      - description: MFA challenge ID (GET)
        in: query
        name: challenge_id
        type: string
      - description: MFA challenge ID (POST)
        in: formData
        name: challenge_id
        type: string
      - description: Verification code (POST)
        in: formData
        name: code
        type: string
      - description: TOTP secret for enrollment (POST)
        in: formData
        name: totp_secret
        type: string
      - description: Whether to trust the device (POST)
        in: formData
        name: trust_device
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: MFA form (GET)
          schema:
            type: string
        "302":
          description: Redirect back to client with code after success (POST)
          schema:
            type: string
      summary: Multi-factor authentication
      tags:
      - mfa
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Renders the MFA verification or enrollment page (GET) or processes
        the MFA code (POST).
      parameters:
      - description: MFA challenge ID (GET)
        in: query
        name: challenge_id
        type: string
      - description: MFA challenge ID (POST)
        in: formData
        name: challenge_id
        type: string
      - description: Verification code (POST)
        in: formData
        name: code
        type: string
      - description: TOTP secret for enrollment (POST)
        in: formData
        name: totp_secret
        type: string
      - description: Whether to trust the device (POST)
        in: formData
        name: trust_device
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: MFA form (GET)
          schema:
            type: string
        "302":
          description: Redirect back to client with code after success (POST)
          schema:
            type: string
      summary: Multi-factor authentication
      tags:
      - mfa
  /oauth2/passkey/login/begin:
    get:
      consumes:
      - application/json
      description: Initiates a WebAuthn authentication ceremony. The user must already
        have a registered passkey. Returns the options for the navigator.credentials.get
        call.
      parameters:
      - description: User's username
        in: query
        name: username
        required: true
        type: string
      - description: Redirect URI
        in: query
        name: redirect_uri
        type: string
      - description: OAuth2 state
        in: query
        name: state
        type: string
      - description: OAuth2 client ID
        in: query
        name: client_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: WebAuthn assertion options
          schema:
            additionalProperties: true
            type: object
      summary: Begin passkey login
      tags:
      - passkey
  /oauth2/passkey/login/finish:
    post:
      consumes:
      - application/json
      description: Processes the WebAuthn assertion from the client and issues an
        authorization code.
      parameters:
      - description: Challenge ID from BeginLogin
        in: query
        name: challenge_id
        required: true
        type: string
      - description: WebAuthn assertion response
        in: body
        name: assertion
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Redirect URL
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Complete passkey login
      tags:
      - passkey
  /oauth2/passkey/register/begin:
    get:
      description: Creates a user account (if not already present) and initiates a
        WebAuthn registration ceremony.
      parameters:
      - description: Desired username
        in: query
        name: username
        required: true
        type: string
      - description: Email address
        in: query
        name: email
        type: string
      - description: Redirect URI
        in: query
        name: redirect_uri
        type: string
      - description: OAuth2 state
        in: query
        name: state
        type: string
      - description: OAuth2 client ID
        in: query
        name: client_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: WebAuthn registration options
          schema:
            additionalProperties: true
            type: object
      summary: Begin passkey registration
      tags:
      - passkey
  /oauth2/passkey/register/finish:
    post:
      consumes:
      - application/json
      description: Processes the WebAuthn attestation from the client and registers
        the passkey.
      parameters:
      - description: Challenge ID from BeginRegistration
        in: query
        name: challenge_id
        required: true
        type: string
      - description: WebAuthn attestation response
        in: body
        name: attestation
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Redirect URL
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Complete passkey registration
      tags:
      - passkey
  /oauth2/register:
    get:
      consumes:
      - application/json
      description: Lists all registered clients (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/client.ClientInfoResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: List all clients
      tags:
      - client
    post:
      consumes:
      - application/json
      description: Registers a new OAuth2/OIDC client (admin only)
      parameters:
      - description: Client registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/client.ClientCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/client.ClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: Register a new OAuth2 client
      tags:
      - client
  /oauth2/register/{client_id}:
    delete:
      consumes:
      - application/json
      description: Deactivates (soft deletes) a registered client (admin only)
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: Deactivate a client
      tags:
      - client
    get:
      consumes:
      - application/json
      description: Retrieves information about a registered client (admin only)
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.ClientInfoResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: Get client information
      tags:
      - client
    put:
      consumes:
      - application/json
      description: Updates a registered client (admin only)
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      - description: Client update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/client.ClientUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.ClientInfoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      summary: Update client information
      tags:
      - client
  /oauth2/revoke:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Revokes an access or refresh token
      parameters:
      - description: Token to revoke
        in: formData
