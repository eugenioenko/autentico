        in: query
        name: state
        type: string
      - description: Client identifier (used to validate post_logout_redirect_uri
          when no id_token_hint)
        in: query
        name: client_id
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Redirect
          schema:
            type: string
      summary: RP-Initiated Logout (GET)
      tags:
      - session
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: RP-Initiated Logout via POST (form-encoded) per OpenID Connect
        RP-Initiated Logout 1.0 §2.
      parameters:
      - description: Previously issued ID token
        in: formData
        name: id_token_hint
        type: string
      - description: Client identifier
        in: formData
        name: client_id
        type: string
      - description: URI to redirect to after logout
        in: formData
        name: post_logout_redirect_uri
        type: string
      - description: Opaque value passed back to post_logout_redirect_uri
        in: formData
        name: state
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Signed-out confirmation page
          schema:
            type: string
        "302":
          description: Redirect to post_logout_redirect_uri
