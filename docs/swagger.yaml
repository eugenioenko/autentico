host: localhost:9999
info:
  contact: {}
  description: Authentication Service
  title: Autentico OIDC
  version: "1.0"
paths:
  /.well-known/openid-configuration:
    get:
      consumes:
      - application/json
      description: Returns the OpenID Connect Well-Known Configuration
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WellKnownConfigResponse'
      summary: Get Well-Known Configuration
      tags:
      - Well-Known
  /account/api/deletion-request:
    delete:
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ApiError'
      summary: Cancel the current user's pending deletion request
      tags:
      - account
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/deletion.DeletionRequestResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
      summary: Get pending deletion request for current user
      tags:
      - account
    post:
      consumes:
      - application/json
      description: Submits a deletion request for the authenticated user. If self-service
        deletion is enabled, the account is deleted immediately.
      parameters:
      - description: Optional deletion reason
        in: body
        name: body
        schema:
          $ref: '#/definitions/deletion.CreateDeletionRequestInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/deletion.DeletionRequestResponse'
        "204":
          description: Account deleted immediately (self-service mode)
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ApiError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.ApiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ApiError'
      summary: Request account deletion
      tags:
      - account
  /admin/api/audit-logs:
    get:
      description: Returns a paginated list of audit events with optional filters.
      parameters:
      - description: Filter by event type
        in: query
        name: event
        type: string
      - description: Filter by actor user ID
        in: query
        name: actor_id
        type: string
      - description: Page size (default 50)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.AuditLogListResponse'
      security:
      - BearerAuth: []
      summary: List audit log events
      tags:
      - admin
  /admin/api/clients:
    get:
      description: Lists all registered clients (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/client.ClientInfoResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      security:
      - BearerAuth: []
      summary: List all clients
      tags:
      - client
    post:
      consumes:
      - application/json
      description: Registers a new OAuth2/OIDC client (admin only)
      parameters:
      - description: Client registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/client.ClientCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/client.ClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      security:
      - BearerAuth: []
      summary: Register a new OAuth2 client
      tags:
      - client
  /admin/api/clients/{client_id}:
    delete:
      description: Deactivates (soft deletes) a registered client (admin only)
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      security:
      - BearerAuth: []
      summary: Deactivate a client
      tags:
      - client
    get:
      description: Retrieves information about a registered client (admin only)
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.ClientInfoResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      security:
      - BearerAuth: []
      summary: Get client information
      tags:
      - client
    put:
      consumes:
      - application/json
      description: Updates a registered client (admin only)
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: string
      - description: Client update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/client.ClientUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.ClientInfoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.AuthErrorResponse'
      security:
      - BearerAuth: []
      summary: Update client information
      tags:
      - client
  /admin/api/deletion-requests:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/deletion.DeletionRequestResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - BearerAuth: []
      summary: List all pending deletion requests
      tags:
      - admin
  /admin/api/deletion-requests/{id}:
    delete:
      parameters:
      - description: Deletion request ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ApiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - BearerAuth: []
      summary: Cancel (dismiss) a deletion request without deleting the user
      tags:
      - admin
  /admin/api/deletion-requests/{id}/approve:
    post:
      parameters:
      - description: Deletion request ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ApiError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - BearerAuth: []
      summary: Approve a deletion request — permanently deletes the user
      tags:
      - admin
  /admin/api/federation:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/federation.ProviderResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List federation providers
      tags:
      - federation-admin
    post:
      consumes:
      - application/json
      parameters:
      - description: Provider request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/federation.FederationProviderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a federation provider
      tags:
      - federation-admin
  /admin/api/federation/{id}:
    delete:
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - BearerAuth: []
      summary: Delete a federation provider
      tags:
      - federation-admin
    get:
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/federation.ProviderResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - BearerAuth: []
      summary: Get a federation provider
      tags:
      - federation-admin
    put:
      consumes:
      - application/json
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        type: string
      - description: Provider request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/federation.FederationProviderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ApiError'
      security:
      - BearerAuth: []
      summary: Update a federation provider
      tags:
      - federation-admin
  /admin/api/sessions:
    get:
      description: Lists all active sessions, optionally filtered by user ID.
      parameters:
      - description: Filter by User ID
        in: query
        name: user_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/session.SessionResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List sessions
      tags:
      - sessions-admin
  /admin/api/sessions/{id}:
    delete:
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deactivate a session
      tags:
      - sessions-admin
  /admin/api/settings:
    get:
      description: Retrieve all system settings (except sensitive values).
      produces:
      - application/json
